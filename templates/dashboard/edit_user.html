{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- left side bar -->
    {% include 'dashboard/sidebar.html'%}

    <!-- right side bar -->
    <div class="col-md-9">
        <h2>Edit user details</h2>
        <form action="{% url 'edit_user' edit_user.id %}" method="post">
            {% csrf_token %}
            {{ form | crispy}}
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
    </div>
</div>
{% endblock content %}
